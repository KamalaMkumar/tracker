<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #6a5acd, #836fff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  transition: 0.3s;
}

/* Card */
.card {
  width: 95%;
  max-width: 400px;
  background: #f3f3f3;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#themeToggle {
  background: #ff8c66;
  border: none;
  border-radius: 10px;
  padding: 6px 10px;
  cursor: pointer;
}

/* Buttons */
.toggle-btns {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.toggle-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.active {
  background: #ff8c66;
  color: white;
}

/* Date */
#date {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* Progress */
.progress-container {
  width: 140px;
  height: 140px;
  margin: 15px auto;
  position: relative;
}

.progress-circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(#4da6ff 0%, #ddd 0%);
  transition: 0.3s;
}

.progress-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: bold;
}

/* Tasks */
.task {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  background: #e5e5e5;
  font-size: 14px;
  transition: all 0.3s ease;
}

/* Hover */
.task:hover {
  transform: scale(1.03);
}

/* Checked animation */
.task.checked {
  background: linear-gradient(135deg, #6ee7b7, #3b82f6);
  color: white;
  transform: scale(1.02);
}

input[type="checkbox"] {
  width: 20px;
  height: 20px;
}

/* Dark Mode */
body.dark {
  background: linear-gradient(135deg, #1e1e2f, #121212);
  color: white;
}

body.dark .card {
  background: #2a2a3d;
}

body.dark .task {
  background: #3a3a4d;
}

body.dark button {
  background: #444;
  color: white;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <h2>Habit Tracker</h2>
    <button id="themeToggle">🌙</button>
  </div>

  <div class="toggle-btns">
    <button id="dailyBtn" class="active">Daily</button>
    <button id="weeklyBtn">Weekly</button>
  </div>

  <input type="date" id="date">

  <div class="progress-container">
    <div class="progress-circle" id="progress"></div>
    <div class="progress-text" id="percent">0%</div>
  </div>

  <div id="tasks"></div>

</div>

<script>
const tasksList = [
  "Wake Up Early",
  "Prayer / Meditation",
  "Study Programming",
  "Practice English",
  "Quantitative Aptitude",
  "Interview Questions",
  "Vocabulary",
  "Daily Revision"
];

const tasksContainer = document.getElementById("tasks");
const progress = document.getElementById("progress");
const percent = document.getElementById("percent");
const dateInput = document.getElementById("date");

let mode = "daily";

/* Set today */
dateInput.value = new Date().toISOString().split("T")[0];

/* Render */
function renderTasks() {
  tasksContainer.innerHTML = "";

  tasksList.forEach((task, index) => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <span>${task}</span>
      <input type="checkbox" data-index="${index}">
    `;

    tasksContainer.appendChild(div);
  });

  loadProgress();
}

/* Get Key */
function getKey(date) {
  return "daily-" + date;
}

/* Last 7 Days */
function getLast7Days() {
  let dates = [];
  for (let i = 0; i < 7; i++) {
    let d = new Date(dateInput.value);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split("T")[0]);
  }
  return dates;
}

/* Save */
function saveProgress() {
  if (mode !== "daily") return;

  const checkboxes = document.querySelectorAll("input[type='checkbox']");
  const data = [...checkboxes].map(cb => cb.checked);

  localStorage.setItem(getKey(dateInput.value), JSON.stringify(data));
  updateProgress();
}

/* Load */
function loadProgress() {
  const checkboxes = document.querySelectorAll("input[type='checkbox']");

  if (mode === "daily") {
    const saved = JSON.parse(localStorage.getItem(getKey(dateInput.value))) || [];

    checkboxes.forEach((cb, i) => {
      cb.checked = saved[i] || false;
      cb.disabled = false;
      cb.onchange = saveProgress;
    });

  } else {
    const dates = getLast7Days();

    checkboxes.forEach((cb, i) => {
      let count = 0;

      dates.forEach(date => {
        const data = JSON.parse(localStorage.getItem("daily-" + date)) || [];
        if (data[i]) count++;
      });

      cb.checked = count >= 4;
      cb.disabled = true;
    });
  }

  updateProgress();
}

/* Animate Progress */
function animateProgress(target) {
  let current = 0;

  let interval = setInterval(() => {
    if (current >= target) {
      clearInterval(interval);
    } else {
      current++;
      percent.innerText = current + "%";
      progress.style.background =
        `conic-gradient(#4da6ff ${current}%, #ddd ${current}%)`;
    }
  }, 10);
}

/* Update */
function updateProgress() {
  const checkboxes = document.querySelectorAll("input[type='checkbox']");
  const total = checkboxes.length;
  const checked = [...checkboxes].filter(cb => cb.checked).length;

  const percentValue = Math.round((checked / total) * 100);

  animateProgress(percentValue);
  updateTaskStyles();
}

/* Task Style */
function updateTaskStyles() {
  document.querySelectorAll(".task").forEach(taskDiv => {
    const cb = taskDiv.querySelector("input");

    if (cb.checked) {
      taskDiv.classList.add("checked");
    } else {
      taskDiv.classList.remove("checked");
    }
  });
}

/* Mode Switch */
document.getElementById("dailyBtn").onclick = () => {
  mode = "daily";
  setActive("dailyBtn");
  loadProgress();
};

document.getElementById("weeklyBtn").onclick = () => {
  mode = "weekly";
  setActive("weeklyBtn");
  loadProgress();
};

function setActive(id) {
  document.querySelectorAll(".toggle-btns button")
    .forEach(btn => btn.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* Date change */
dateInput.addEventListener("change", loadProgress);

/* Theme */
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
};

/* Load Theme */
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

/* Init */
renderTasks();
</script>

</body>
</html>
