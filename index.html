<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Habit Tracker Pro</title>

<style>
:root {
  --bg-light: linear-gradient(135deg, #667eea, #764ba2);
  --bg-dark: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

  --card-light: #ffffff;
  --card-dark: rgba(255, 255, 255, 0.08);

  --text-light: #333;
  --text-dark: #fff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  transition: 0.4s;
  background: var(--bg-light);
}

/* Dark Mode */
body.dark {
  background: var(--bg-dark);
}

/* Container */
.container {
  width: 350px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

/* Light Card */
body:not(.dark) .container {
  background: var(--card-light);
  color: var(--text-light);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Dark Card */
body.dark .container {
  background: var(--card-dark);
  color: var(--text-dark);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Toggle */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.mode-toggle {
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 10px;
  border: none;
  background: #ff7e5f;
  color: white;
}

/* Buttons */
.toggle-btns button {
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.toggle-btns .active {
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  color: white;
}

/* Date */
input[type="date"] {
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
}

/* Progress Circle */
.progress-circle {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  transition: 0.5s;
  background: conic-gradient(#4facfe 0%, #eee 0%);
}

/* Tasks */
.task {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-radius: 12px;
  margin: 6px 0;
  transition: 0.3s;
  align-items: center;
}

/* Light tasks */
body:not(.dark) .task {
  background: #f5f7fa;
}

/* Dark tasks */
body.dark .task {
  background: rgba(255,255,255,0.08);
}

.task:hover {
  transform: scale(1.03);
}

.task input {
  transform: scale(1.2);
  accent-color: #667eea;
}

/* Color Borders */
.task:nth-child(1) { border-left: 5px solid #ff6b6b; }
.task:nth-child(2) { border-left: 5px solid #6bcB77; }
.task:nth-child(3) { border-left: 5px solid #4d96ff; }
.task:nth-child(4) { border-left: 5px solid #ffd93d; }
.task:nth-child(5) { border-left: 5px solid #845ec2; }
.task:nth-child(6) { border-left: 5px solid #ff9671; }
.task:nth-child(7) { border-left: 5px solid #00c9a7; }
.task:nth-child(8) { border-left: 5px solid #ffc75f; }

</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h3>Habit Tracker</h3>
    <button class="mode-toggle" onclick="toggleMode()">🌙</button>
  </div>

  <div class="toggle-btns">
    <button class="active">Daily</button>
    <button>Weekly</button>
  </div>

  <input type="date" id="date">

  <div class="progress-circle" id="progress">0%</div>

  <div id="tasks">
    <div class="task"><span>Wake Up Early</span><input type="checkbox"></div>
    <div class="task"><span>Prayer / Meditation</span><input type="checkbox"></div>
    <div class="task"><span>Study Programming</span><input type="checkbox"></div>
    <div class="task"><span>Practice English</span><input type="checkbox"></div>
    <div class="task"><span>Quantitative Aptitude</span><input type="checkbox"></div>
    <div class="task"><span>Interview Questions</span><input type="checkbox"></div>
    <div class="task"><span>Vocabulary</span><input type="checkbox"></div>
    <div class="task"><span>Daily Revision</span><input type="checkbox"></div>
  </div>

</div>

<script>
const checkboxes = document.querySelectorAll("input[type='checkbox']");
const progress = document.getElementById("progress");
const dateInput = document.getElementById("date");
const buttons = document.querySelectorAll(".toggle-btns button");

let mode = "daily";

/* Format date */
function getDateKey() {
  return dateInput.value;
}

/* Save daily progress */
function saveProgress() {
  let checked = [...checkboxes].filter(cb => cb.checked).length;
  let total = checkboxes.length;
  let percent = Math.round((checked / total) * 100);

  localStorage.setItem(getDateKey(), percent);
}

/* Load daily progress */
function loadProgress() {
  let percent = localStorage.getItem(getDateKey()) || 0;

  progress.innerText = percent + "%";
  progress.style.background =
    `conic-gradient(#4facfe ${percent}%, #eee ${percent}%)`;
}

/* Update progress */
function updateProgress() {
  if (mode === "daily") {
    let total = checkboxes.length;
    let checked = 0;

    checkboxes.forEach(cb => {
      if (cb.checked) checked++;
    });

    let percent = Math.round((checked / total) * 100);

    progress.innerText = percent + "%";
    progress.style.background =
      `conic-gradient(#4facfe ${percent}%, #eee ${percent}%)`;

    saveProgress();
  }
}

/* Weekly calculation */
function calculateWeekly() {
  let total = 0;
  let count = 0;

  for (let i = 0; i < 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() - i);
    let key = d.toISOString().split("T")[0];

    let value = parseInt(localStorage.getItem(key));

    if (!isNaN(value)) {
      total += value;
      count++;
    }
  }

  let avg = count ? Math.round(total / count) : 0;

  progress.innerText = avg + "%";
  progress.style.background =
    `conic-gradient(#ff7e5f ${avg}%, #eee ${avg}%)`;
}

/* Checkbox event */
checkboxes.forEach(cb => {
  cb.addEventListener("change", updateProgress);
});

/* Date change */
dateInput.addEventListener("change", () => {
  if (mode === "daily") loadProgress();
});

/* Toggle buttons */
buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    mode = btn.innerText.toLowerCase();

    if (mode === "daily") {
      loadProgress();
    } else {
      calculateWeekly();
    }
  });
});

/* Init */
dateInput.valueAsDate = new Date();
loadProgress();
</script>
</body>
</html>
